name: Verify

on:
  pull_request:
  push:
    branches:
      - main
      - 'ai/**'
      - 'feat/**'
      - 'fix/**'
      - 'docs/**'
      - 'ci/**'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,release]'

      - name: Validate acpx contract fixtures
        run: python3 scripts/validate_contract_fixtures.py fixtures/acpx-0.10.0

      - name: Run tests
        run: python3 -m pytest -q

      - name: Compile Python sources
        run: python3 -m compileall -q src scripts tests

      - name: CLI doctor smoke
        run: |
          agent-run-supervisor doctor > /tmp/agent-run-supervisor-doctor.json
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('/tmp/agent-run-supervisor-doctor.json').read_text())
          assert data['ok'] is True
          assert data['launched_real_agent'] is False
          PY

      - name: CLI replay smoke
        run: agent-run-supervisor replay fixtures/acpx-0.10.0/success-codex-sentinel/stdout.ndjson

      - name: Check docs index
        run: python tools/build_docs_index.py --check

      - name: Check docs drift report
        run: python tools/docs_drift_signal.py --check

      - name: Build package and check metadata
        run: |
          rm -rf dist build src/agent_run_supervisor.egg-info
          python -m build
          python -m twine check dist/*

      - name: Installed wheel smoke
        run: |
          python -m venv /tmp/ars-wheel-smoke
          /tmp/ars-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/ars-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/ars-wheel-smoke/bin/agent-run-supervisor --help >/tmp/ars-help.txt
          /tmp/ars-wheel-smoke/bin/agent-run-supervisor doctor > /tmp/ars-installed-doctor.json
          /tmp/ars-wheel-smoke/bin/python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('/tmp/ars-installed-doctor.json').read_text())
          assert data['ok'] is True
          assert data['launched_real_agent'] is False
          assert data['fixture_replay']['protocol_error'] is False
          assert data['fixture_replay']['final_message'] == 'CODEX_ACPX_OK'
          PY

      - name: Whitespace diff check
        run: git diff --check
